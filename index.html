<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cosmic Bike 3D — базовый</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; touch-action:none; }
    canvas { display:block; }
    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 28px;
      text-shadow: 0 0 8px black;
      pointer-events: auto;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      pointer-events: auto;
      box-shadow: 0 0 30px #00ff88;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 48px;
      color: #00ff88;
      text-shadow: 0 0 16px #00ff88;
    }
    button {
      padding: 16px 48px;
      font-size: 24px;
      background: #00ff88;
      color: black;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="ui">
  <div id="score" style="display:none">Счёт: 0</div>
  <div id="menu">
    <h1>Cosmic Bike 3D</h1>
    <button id="startBtn">Начать</button>
  </div>
</div>

<script>
// Telegram
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Three.js
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 4000);
camera.position.set(0, 3, 8);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Туннель
const tunnel = new THREE.Mesh(
  new THREE.CylinderGeometry(20, 20, 4000, 48, 1, true),
  new THREE.MeshBasicMaterial({
    color: 0x001133,
    side: THREE.BackSide,
    transparent: true,
    opacity: 0.7
  })
);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// Звёзды
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 8000;
const posArray = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 2000;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const starsMaterial = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 1.2,
  transparent: true,
  opacity: 0.9
});
const starField = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starField);

// Велосипед (очень простой)
const bike = new THREE.Group();

// Колёса
const wheel = new THREE.Mesh(
  new THREE.CircleGeometry(1.2, 24),
  new THREE.MeshBasicMaterial({ color: 0xff5500 })
);
wheel.position.set(-1.5, -1.5, 0);
bike.add(wheel.clone());
wheel.position.x = 1.5;
bike.add(wheel);

// Рама
const frame = new THREE.Mesh(
  new THREE.BoxGeometry(4, 0.6, 0.6),
  new THREE.MeshBasicMaterial({ color: 0x00aaff })
);
frame.position.y = -0.8;
bike.add(frame);

bike.position.y = -8;
scene.add(bike);

// Переменные
let score = 0;
let gameRunning = false;
let playerLane = 0; // -1 лево, 0 центр, 1 право

// Управление свайпом
let touchStartX = 0, touchStartY = 0;
renderer.domElement.addEventListener('pointerdown', e => {
  touchStartX = e.clientX;
  touchStartY = e.clientY;
});
renderer.domElement.addEventListener('pointerup', e => {
  if (!gameRunning) return;
  const dx = e.clientX - touchStartX;
  const dy = touchStartY
