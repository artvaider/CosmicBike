<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; color:#fff; touch-action: none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #ui > * { pointer-events:auto; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.7); padding:40px; border-radius:20px; display:flex; flex-direction:column; gap:20px; }
    button { padding:15px 40px; font-size:24px; background:#00ff88; color:#000; border:none; border-radius:10px; cursor:pointer; }
  </style>
</head>
<body>

<div id="ui">
  <div style="position:absolute; top:20px; left:20px; font-size:24px;">
    Счёт: <span id="score">0</span>
  </div>
  <div id="menu">
    <h1 style="margin:0; font-size:48px; color:#00ff88;">Cosmic Bike</h1>
    <button id="startBtn">Играть</button>
    <button id="restartBtn" style="display:none;">Заново</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setBackgroundColor('#000');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let playerLane = 1;          // 0 = left, 1 = center, 2 = right
let lanes = 3;
let score = 0;
let speed = 5;
let gameRunning = false;
let gameOver = false;

const laneWidth = () => canvas.width / lanes;
const getLaneX = (lane) => (lane + 0.5) * laneWidth();

// Управление: тап влево/вправо экрана → смена полосы
canvas.addEventListener('pointerdown', (e) => {
  if (!gameRunning || gameOver) return;
  const touchX = e.clientX;
  if (touchX < canvas.width / 2) {
    // тап слева → влево
    if (playerLane > 0) playerLane--;
  } else {
    // тап справа → вправо
    if (playerLane < lanes - 1) playerLane++;
  }
});

// Запуск игры
function startGame() {
  document.getElementById('menu').style.display = 'none';
  gameRunning = true;
  gameOver = false;
  score = 0;
  speed = 5;
  playerLane = 1; // центр
  loop();
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('restartBtn').style.display = 'none';
  startGame();
});

// Анимация
function loop() {
  if (!gameRunning || gameOver) return;

  // Трейл для психоделии
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Дорога (3 полосы + разделители)
  const colors = ['#00aaff', '#00ff88', '#ff8800']; // разные цвета полос
  for (let i = 0; i < lanes; i++) {
    ctx.fillStyle = colors[i];
    ctx.fillRect(i * laneWidth(), 0, laneWidth(), canvas.height);
  }
  // Разделители (белые пунктирные)
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 6;
  ctx.setLineDash([20, 40]);
  for (let i = 1; i < lanes; i++) {
    ctx.beginPath();
    ctx.moveTo(i * laneWidth(), 0);
    ctx.lineTo(i * laneWidth(), canvas.height);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Звёзды / частицы
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 100; i++) {
    let x = Math.random() * canvas.width;
    let y = (Date.now() * 0.1 + i * 50) % canvas.height;
    ctx.globalAlpha = Math.random() * 0.5 + 0.5;
    ctx.fillRect(x, y, 3, 3);
  }
  ctx.globalAlpha = 1;

  // Персонаж (оранжевый круг + зелёная "рама")
  const px = getLaneX(playerLane);
  const py = canvas.height - 120;

  ctx.fillStyle = '#00ff88';
  ctx.fillRect(px - 50, py - 30, 100, 60); // рама велика
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(px, py - 70, 40, 0, Math.PI*2); // голова/колесо
  ctx.fill();

  // Счёт + ускорение
  score += 0.2;
  document.getElementById('score').innerText = Math.floor(score);
  if (score > 200) speed = 8;
  if (score > 500) speed = 12;

  requestAnimationFrame(loop);
}

// Пока меню — можно добавить анимированный фон, но пока статично
function showMenu(isGameOver = false) {
  const menu = document.getElementById('menu');
  menu.style.display = 'flex';
  document.getElementById('startBtn').style.display = isGameOver ? 'none' : 'block';
  document.getElementById('restartBtn').style.display = isGameOver ? 'block' : 'none';
  if (isGameOver) {
    menu.innerHTML = `<h1 style="color:#ff4444;">Game Over</h1>
                      <p>Счёт: ${Math.floor(score)}</p>
                      <button id="restartBtn">Заново</button>`;
    document.getElementById('restartBtn').addEventListener('click', () => {
      showMenu(false);
      startGame();
    });
  }
}

// Старт с меню
showMenu();

// Если захочешь добавить game over (пока без препятствий — просто для теста)
setTimeout(() => {
  // Пример: через 30 сек game over (потом заменим на столкновение)
  // gameOver = true;
  // gameRunning = false;
  // showMenu(true);
}, 999999); // закомментировано

</script>
</body>
</html>
