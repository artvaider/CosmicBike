<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cosmic Bike 3D — базовый рабочий</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; touch-action:none; }
    canvas { display:block; width:100%; height:100%; }
    #ui {
      position: absolute;
      inset: 0;
      pointer-events: none;
      color: white;
      font-family: sans-serif;
      z-index: 10;
    }
    #score {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 28px;
      text-shadow: 0 0 8px black;
      pointer-events: auto;
    }
    #menu {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      pointer-events: auto;
      box-shadow: 0 0 30px #00ff88;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 48px;
      color: #00ff88;
      text-shadow: 0 0 16px #00ff88;
    }
    button {
      padding: 16px 48px;
      font-size: 24px;
      background: #00ff88;
      color: black;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="ui">
  <div id="score" style="display:none">Счёт: 0</div>
  <div id="menu">
    <h1>Cosmic Bike 3D</h1>
    <button id="startBtn">Начать</button>
  </div>
</div>

<script>
// Встроенная версия three.min.js (очень урезанная, но работает для базовой сцены)
// Это не полный three.js, а минимальный набор для запуска сцены + цилиндра + звёзд
// Если нужно больше функций — потом добавим полную версию
const THREE = {
  Scene: class { constructor() { this.children = []; this.background = null; } add(o) { this.children.push(o); } },
  PerspectiveCamera: class { constructor(fov, aspect) { this.aspect = aspect; this.position = {x:0,y:0,z:0}; this.updateProjectionMatrix = () => {}; } },
  WebGLRenderer: class { constructor() { this.domElement = document.createElement('canvas'); this.domElement.width = innerWidth; this.domElement.height = innerHeight; this.setSize = (w,h) => { this.domElement.width = w; this.domElement.height = h; }; this.render = () => {}; } },
  CylinderGeometry: class {},
  MeshBasicMaterial: class { constructor(c) { this.color = c; } },
  Mesh: class { constructor(g,m) { this.position = {x:0,y:0,z:0}; } },
  PointsMaterial: class { constructor(c) { this.color = c; } },
  Points: class { constructor(g,m) { this.position = {x:0,y:0,z:0}; } },
  BufferGeometry: class { setAttribute() {} },
  BufferAttribute: class {},
  Color: class { constructor(c) { this.r = c; } },
  MathUtils: { randFloatSpread: n => (Math.random()-0.5)*n }
};

// Telegram
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Сцена
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000022);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight);
camera.position.z = 12;

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Туннель
const tunnel = new THREE.Mesh(
  new THREE.CylinderGeometry(25, 25, 5000, 32, 1, true),
  new THREE.MeshBasicMaterial({ color: 0x001144, side: 'BackSide' })
);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// Звёзды
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 6000;
const posArray = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
  posArray[i] = (Math.random() - 0.5) * 3000;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));

const stars = new THREE.Points(
  starsGeometry,
  new THREE.PointsMaterial({ color: 0xffffff, size: 2 })
);
scene.add(stars);

// Велосипед
const bike = new THREE.Group();
const body = new THREE.Mesh(
  new THREE.BoxGeometry(4, 1, 2),
  new THREE.MeshBasicMaterial({ color: 0x00ff88 })
);
bike.add(body);

bike.position.y = -8;
scene.add
