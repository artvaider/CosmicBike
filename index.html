<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; color:#fff; touch-action: none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #ui > * { pointer-events:auto; }
    #score { position:absolute; top:20px; left:20px; font-size:32px; text-shadow:0 0 10px #000; z-index:20; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.8); padding:50px 40px; border-radius:24px; display:flex; flex-direction:column; gap:24px; min-width:320px; box-shadow:0 0 40px rgba(0,255,136,0.4); z-index:30; }
    button { padding:18px 60px; font-size:28px; background:#00ff88; color:#000; border:none; border-radius:16px; cursor:pointer; font-weight:bold; }
    button.secondary { background:#555; color:#fff; }
    h1 { margin:0; font-size:56px; color:#00ff88; text-shadow:0 0 20px #00ff88; }
  </style>
</head>
<body>

<div id="ui">
  <div id="score">Счёт: 0</div>
  <div id="menu"></div>
</div>

<canvas id="canvas"></canvas>

<script>
// ... (вставь сюда весь код loop, звёзды, прыжок, препятствия из предыдущей рабочей 2D-версии, которую ты тестировал раньше)

function showMenu(isStart = true) {
  const menu = document.getElementById('menu');
  if (isStart) {
    menu.innerHTML = `
      <h1>Cosmic Bike</h1>
      <button id="playBtn">Играть</button>
    `;
    document.getElementById('playBtn').onclick = startGame;
  } else {
    menu.innerHTML = `
      <h1 style="color:#ff4444;">Game Over</h1>
      <p>Счёт: ${Math.floor(score)}</p>
      <button id="restartBtn">Заново</button>
      <button id="mainMenuBtn" class="secondary">В главное меню</button>
    `;
    document.getElementById('restartBtn').onclick = startGame;
    document.getElementById('mainMenuBtn').onclick = () => showMenu(true);
  }
  menu.style.display = 'flex';
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('score').style.display = 'block';
  gameRunning = true;
  gameOver = false;
  score = 0;
  speed = 4;
  playerLane = 1;
  playerY = 0;
  isJumping = false;
  shieldTime = 0;
  obstacles = [];
  bonuses = [];
  loop();
}

// Инициализация
showMenu(true);
document.getElementById('score').style.display = 'none';
</script>
</body>
</html>
