<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; color:#fff; touch-action: none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #ui > * { pointer-events:auto; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.8); padding:50px 40px; border-radius:24px; display:flex; flex-direction:column; gap:24px; min-width:320px; box-shadow:0 0 40px rgba(0,255,136,0.4); }
    button { padding:18px 60px; font-size:28px; background:#00ff88; color:#000; border:none; border-radius:16px; cursor:pointer; font-weight:bold; }
    button.secondary { background:#555; color:#fff; }
    h1 { margin:0; font-size:56px; color:#00ff88; text-shadow:0 0 20px #00ff88; }
  </style>
</head>
<body>

<div id="ui">
  <div style="position:absolute; top:20px; left:20px; font-size:32px; text-shadow:0 0 10px #000;">
    Счёт: <span id="score">0</span>
  </div>
  <div id="menu"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setBackgroundColor('#000');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let playerLane = 1, lanes = 3;
let score = 0, speed = 5;
let gameRunning = false, gameOver = false;
let obstacles = [], bonuses = [];
let isJumping = false, playerY = 0;
let shieldTime = 0; // время щита в секундах

const laneWidth = () => canvas.width / lanes;
const getLaneX = (lane) => (lane + 0.5) * laneWidth();
const groundY = () => canvas.height - 180;

// === ЗВУКИ ===
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  if (type === 'jump') { osc.frequency.value = 600; gain.gain.value = 0.3; osc.type = 'sine'; }
  else if (type === 'collect') { osc.frequency.value = 1200; gain.gain.value = 0.4; }
  else if (type === 'crash') { osc.frequency.value = 150; gain.gain.value = 0.6; osc.type = 'sawtooth'; }
  osc.start();
  setTimeout(() => { osc.stop(); }, type === 'crash' ? 400 : 150);
}

// === СВАЙП ДЛЯ ПРЫЖКА ===
let touchStartY = 0;
canvas.addEventListener('pointerdown', e => {
  if (!gameRunning || gameOver) return;
  touchStartY = e.clientY;
});
canvas.addEventListener('pointerup', e => {
  if (!gameRunning || gameOver) return;
  const deltaY = touchStartY - e.clientY;
  if (deltaY > 80) { // свайп вверх
    if (!isJumping) {
      isJumping = true;
      playerY = -22;
      playSound('jump');
    }
  } else {
    // обычная смена полосы
    const touchX = e.clientX;
    if (touchX < canvas.width / 2 && playerLane > 0) playerLane--;
    else if (touchX > canvas.width / 2 && playerLane < lanes - 1) playerLane++;
  }
});

class Obstacle { /* тот же код, что раньше */ 
  constructor(lane) { this.lane = lane; this.x = getLaneX(lane); this.y = -100; this.size = 80 + Math.random()*50; this.rotation = 0; }
  update() { this.y += speed * 1.4; this.rotation += 0.05; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = '#666'; ctx.beginPath(); ctx.arc(0,0,this.size/2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 10; ctx.stroke();
    ctx.restore();
  }
}

class Bonus {
  constructor(lane) {
    this.lane = lane;
    this.x = getLaneX(lane);
    this.y = -80;
    this.size = 45;
  }
  update() { this.y += speed * 1.1; }
  draw() {
    ctx.fillStyle = '#ffdd00';
    ctx.shadowBlur = 25; ctx.shadowColor = '#ffff00';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function checkCollision() {
  if (shieldTime > 0) return false; // щит защищает
  const px = getLaneX(playerLane);
  const py = groundY() + playerY;
  for (let obs of obstacles) {
    if (obs.lane !== playerLane) continue;
    if (isJumping && playerY < -70) continue; // перепрыгиваем!
    const dx = px - obs.x;
    const dy = py - obs.y;
    if (Math.sqrt(dx*dx + dy*dy) < obs.size/2 + 55) return true;
  }
  return false;
}

function collectBonuses() {
  const px = getLaneX(playerLane);
  const py = groundY() + playerY;
  for (let i = bonuses.length-1; i >= 0; i--) {
    const b = bonuses[i];
    if (b.lane === playerLane) {
      const dx = px - b.x;
      const dy = py - b.y;
      if (Math.sqrt(dx*dx + dy*dy) < 80) {
        score += 50;
        shieldTime = 5;
        playSound('collect');
        bonuses.splice(i, 1);
      }
    }
  }
}

function showMenu(isStart = true) {
  const menu = document.getElementById('menu');
  menu.style.display = 'flex';
  if (isStart) {
    menu.innerHTML = `<h1>Cosmic Bike</h1><button id="playBtn">Играть</button>`;
    document.getElementById('playBtn').onclick = startGame;
  } else {
    menu.innerHTML = `
      <h1 style="color:#ff4444;">Game Over</h1>
      <p>Счёт: ${Math.floor(score)}</p>
      <button id="restartBtn">Заново</button>
      <button id="menuBtn" class="secondary">В главное меню</button>
    `;
    document.getElementById('restartBtn').onclick = startGame;
    document.getElementById('menuBtn').onclick = () => { menu.style.display = 'none'; showMenu(true); };
  }
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  gameRunning = true; gameOver = false;
  score = 0; speed = 5; playerLane = 1; playerY = 0; isJumping = false; shieldTime = 0;
  obstacles = []; bonuses = [];
  loop();
}

// Спавн
setInterval(() => {
  if (!gameRunning || gameOver) return;
  const lane = Math.floor(Math.random() * lanes);
  if (Math.random() < 0.25) bonuses.push(new Bonus(lane));
  else obstacles.push(new Obstacle(lane));
}, 1100);

function loop() {
  if (!gameRunning || gameOver) return;

  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // полосы, звёзды (тот же код, что раньше — не менял для краткости)

  obstacles.forEach(o => { o.update(); o.draw(); });
  bonuses.forEach(b => { b.update(); b.draw(); });
  collectBonuses();

  // прыжок
  if (isJumping) {
    playerY += 1.1;
    if (playerY >= 0) { playerY = 0; isJumping = false; }
  }
  if (shieldTime > 0) shieldTime -= 0.016;

  // персонаж с анимацией колёс
  const px = getLaneX(playerLane);
  const py = groundY() + playerY;
  const wheelAngle = Date.now() * 0.02;

  ctx.shadowBlur = shieldTime > 0 ? 30 : 15;
  ctx.shadowColor = shieldTime > 0 ? '#00ffff' : '#00ff88';

  // рама и колёса
  ctx.fillStyle = '#00ccff';
  ctx.fillRect(px-55, py-25, 110, 18);
  ctx.fillStyle = '#ff8800';
  ctx.save(); ctx.translate(px-40, py); ctx.rotate(wheelAngle); ctx.beginPath(); ctx.arc(0,0,34,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.translate(px+40, py); ctx.rotate(wheelAngle); ctx.beginPath(); ctx.arc(0,0,34,0,Math.PI*2); ctx.fill(); ctx.restore();

  ctx.shadowBlur = 0;

  // проверка столкновения
  if (checkCollision()) {
    playSound('crash');
    gameOver = true; gameRunning = false;
    showMenu(false);
  }

  score += 0.35;
  document.getElementById('score').innerText = Math.floor(score);
  speed = 5 + score * 0.009;

  requestAnimationFrame(loop);
}

showMenu(true);
</script>
</body>
</html>
