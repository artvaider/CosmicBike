<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; color:#fff; touch-action: none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #ui > * { pointer-events:auto; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.8); padding:50px 40px; border-radius:24px; display:flex; flex-direction:column; gap:24px; min-width:320px; box-shadow:0 0 40px rgba(0,255,136,0.4); }
    button { padding:18px 60px; font-size:28px; background:#00ff88; color:#000; border:none; border-radius:16px; cursor:pointer; font-weight:bold; }
    button.secondary { background:#555; color:#fff; }
    h1 { margin:0; font-size:56px; color:#00ff88; text-shadow:0 0 20px #00ff88; }
  </style>
</head>
<body>

<div id="ui">
  <div style="position:absolute; top:20px; left:20px; font-size:32px; text-shadow:0 0 10px #000;">
    Счёт: <span id="score">0</span>
  </div>
  <div id="menu"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setBackgroundColor('#000');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let playerLane = 1, lanes = 3;
let score = 0, speed = 4; // замедлил базовую скорость
let gameRunning = false, gameOver = false;
let obstacles = [], bonuses = [];
let isJumping = false, jumpVelocity = -28, gravity = 0.7, playerY = 0; // выше и медленнее падение
let shieldTime = 0;

// Звёзды с parallax
let stars = [];
for (let i = 0; i < 400; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 3 + 0.5, // глубина
    size: Math.random() * 4 + 1
  });
}

const laneWidth = () => canvas.width / lanes;
const getLaneX = (lane) => (lane + 0.5) * laneWidth();
const groundY = () => canvas.height - 180;

// Свайп
let touchStartY = 0;
canvas.addEventListener('pointerdown', e => { touchStartY = e.clientY; });
canvas.addEventListener('pointerup', e => {
  if (!gameRunning || gameOver) return;
  const deltaY = touchStartY - e.clientY;
  if (deltaY > 120) { // сильнее свайп
    if (!isJumping) {
      isJumping = true;
      playerY = jumpVelocity;
    }
  } else {
    const touchX = e.clientX;
    if (touchX < canvas.width / 2 && playerLane > 0) playerLane--;
    else if (touchX > canvas.width / 2 && playerLane < lanes - 1) playerLane++;
  }
});

class Obstacle {
  constructor(lane) {
    this.lane = lane;
    this.x = getLaneX(lane);
    this.y = -150;
    this.size = 100 + Math.random() * 50;
    this.rotation = Math.random() * Math.PI * 2;
  }
  update() { this.y += speed * 1.2; this.rotation += 0.04; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = '#888';
    ctx.beginPath(); ctx.arc(0,0,this.size/2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#444'; ctx.lineWidth = 10; ctx.stroke();
    ctx.restore();
  }
}

// ... (Bonus класс, checkCollision, collectBonuses, showMenu, startGame — без изменений, чтобы не удлинять)

function loop() {
  if (!gameRunning || gameOver) return;

  const time = Date.now() * 0.0005; // медленнее пульсация

  // Мягкий психоделический фон
  const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height));
  gradient.addColorStop(0, `hsl(${time * 60 % 360}, 70%, 15%)`);
  gradient.addColorStop(0.6, `hsl(${(time * 60 + 90) % 360}, 80%, 8%)`);
  gradient.addColorStop(1, '#000111');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Туннельные линии (медленнее)
  ctx.strokeStyle = `rgba(200,255,255,${0.2 + Math.sin(time*3)*0.1})`;
  ctx.lineWidth = 5;
  for (let i = 0; i < 16; i++) {
    const angle = i * Math.PI / 8 + time * 0.3;
    const x1 = canvas.width/2 + Math.cos(angle) * 150;
    const y1 = canvas.height/2 + Math.sin(angle) * 150;
    const x2 = canvas.width/2 + Math.cos(angle) * canvas.width;
    const y2 = canvas.height/2 + Math.sin(angle) * canvas.height;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  // Звёзды (замедленные, мягче)
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    s.y += speed * s.z * 0.4; // медленнее
    if (s.y > canvas.height) s.y = -20;
    ctx.globalAlpha = s.z * 0.4 + 0.3;
    ctx.fillRect(s.x, s.y, s.size * s.z, s.size * s.z);
  });
  ctx.globalAlpha = 1;

  // Препятствия, бонусы, прыжок, персонаж (как раньше)

  // ... (остальной код loop без изменений)

  requestAnimationFrame(loop);
}

showMenu(true);
</script>
</body>
</html>
