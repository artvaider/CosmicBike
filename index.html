<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; font-family:sans-serif; color:#fff; touch-action: none; }
    canvas { display:block; width:100%; height:100%; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; }
    #ui > * { pointer-events:auto; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.8); padding:50px 40px; border-radius:24px; display:flex; flex-direction:column; gap:24px; min-width:320px; box-shadow:0 0 40px rgba(0,255,136,0.4); }
    button { padding:18px 60px; font-size:28px; background:#00ff88; color:#000; border:none; border-radius:16px; cursor:pointer; font-weight:bold; }
    button.secondary { background:#555; color:#fff; }
    h1 { margin:0; font-size:56px; color:#00ff88; text-shadow:0 0 20px #00ff88; }
  </style>
</head>
<body>

<div id="ui">
  <div style="position:absolute; top:20px; left:20px; font-size:32px; text-shadow:0 0 10px #000;">
    Счёт: <span id="score">0</span>
  </div>
  <div id="menu"></div>
</div>

<canvas id="canvas"></canvas>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.setBackgroundColor('#000');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

let playerLane = 1, lanes = 3;
let score = 0, speed = 5;
let gameRunning = false, gameOver = false;
let obstacles = [], bonuses = [];
let isJumping = false, jumpVelocity = -24, gravity = 0.9, playerY = 0;
let shieldTime = 0;

// Космические частицы (многослойные для туннеля)
let stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    z: Math.random() * 2 + 0.5, // глубина (для parallax)
    size: Math.random() * 3 + 1
  });
}

const laneWidth = () => canvas.width / lanes;
const getLaneX = (lane) => (lane + 0.5) * laneWidth();
const groundY = () => canvas.height - 180;

// Свайп
let touchStartY = 0;
canvas.addEventListener('pointerdown', e => { touchStartY = e.clientY; });
canvas.addEventListener('pointerup', e => {
  if (!gameRunning || gameOver) return;
  const deltaY = touchStartY - e.clientY;
  if (deltaY > 100) { // свайп вверх сильнее
    if (!isJumping) {
      isJumping = true;
      playerY = jumpVelocity;
    }
  } else {
    const touchX = e.clientX;
    if (touchX < canvas.width / 2 && playerLane > 0) playerLane--;
    else if (touchX > canvas.width / 2 && playerLane < lanes - 1) playerLane++;
  }
});

class Obstacle {
  constructor(lane) {
    this.lane = lane;
    this.x = getLaneX(lane);
    this.y = -120;
    this.size = 90 + Math.random() * 60;
    this.rotation = Math.random() * Math.PI * 2;
  }
  update() { this.y += speed * 1.5; this.rotation += 0.06; }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = '#777';
    ctx.beginPath(); ctx.arc(0,0,this.size/2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#333'; ctx.lineWidth = 12; ctx.stroke();
    ctx.restore();
  }
}

class Bonus {
  constructor(lane) {
    this.lane = lane;
    this.x = getLaneX(lane);
    this.y = -80;
    this.size = 50;
  }
  update() { this.y += speed * 1.2; }
  draw() {
    ctx.shadowBlur = 40; ctx.shadowColor = '#ffff00';
    ctx.fillStyle = '#ffea00';
    ctx.beginPath(); ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function checkCollision() {
  if (shieldTime > 0) return false;
  const px = getLaneX(playerLane);
  const py = groundY() + playerY;
  for (let obs of obstacles) {
    if (obs.lane !== playerLane) continue;
    if (isJumping && playerY < -100) continue; // теперь перепрыгивает надёжно
    const dx = px - obs.x;
    const dy = py - obs.y;
    if (Math.sqrt(dx*dx + dy*dy) < obs.size/2 + 60) return true;
  }
  return false;
}

function collectBonuses() {
  const px = getLaneX(playerLane);
  const py = groundY() + playerY;
  for (let i = bonuses.length - 1; i >= 0; i--) {
    const b = bonuses[i];
    if (b.lane === playerLane) {
      const dx = px - b.x;
      const dy = py - b.y;
      if (Math.sqrt(dx*dx + dy*dy) < 90) {
        score += 50;
        shieldTime = 6;
        bonuses.splice(i, 1);
      }
    }
  }
}

function showMenu(isStart = true) {
  const menu = document.getElementById('menu');
  menu.style.display = 'flex';
  if (isStart) {
    menu.innerHTML = `<h1>Cosmic Bike</h1><button id="playBtn">Играть</button>`;
    document.getElementById('playBtn').onclick = startGame;
  } else {
    menu.innerHTML = `
      <h1 style="color:#ff4444;">Game Over</h1>
      <p>Счёт: ${Math.floor(score)}</p>
      <button id="restartBtn">Заново</button>
      <button id="menuBtn" class="secondary">В главное меню</button>
    `;
    document.getElementById('restartBtn').onclick = startGame;
    document.getElementById('menuBtn').onclick = () => showMenu(true);
  }
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  gameRunning = true; gameOver = false;
  score = 0; speed = 5; playerLane = 1; playerY = 0; isJumping = false; shieldTime = 0;
  obstacles = []; bonuses = [];
  loop();
}

setInterval(() => {
  if (!gameRunning || gameOver) return;
  const lane = Math.floor(Math.random() * lanes);
  if (Math.random() < 0.2) bonuses.push(new Bonus(lane));
  else obstacles.push(new Obstacle(lane));
}, 1000 - Math.min(score * 1.2, 600));

function loop() {
  if (!gameRunning || gameOver) return;

  const time = Date.now() * 0.001;

  // Психоделический фон + туннель
  const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height));
  gradient.addColorStop(0, `hsl(${time * 30 % 360}, 80%, 20%)`);
  gradient.addColorStop(0.5, `hsl(${(time * 30 + 120) % 360}, 90%, 10%)`);
  gradient.addColorStop(1, '#000');
  ctx.fillStyle = gradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Туннельные линии (радиальные)
  ctx.strokeStyle = `rgba(255,255,255,${0.3 + Math.sin(time*5)*0.2})`;
  ctx.lineWidth = 4;
  for (let i = 0; i < 24; i++) {
    const angle = i * Math.PI / 12 + time * 0.5;
    const x1 = canvas.width/2 + Math.cos(angle) * 200;
    const y1 = canvas.height/2 + Math.sin(angle) * 200;
    const x2 = canvas.width/2 + Math.cos(angle) * canvas.width;
    const y2 = canvas.height/2 + Math.sin(angle) * canvas.height;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }

  // Звёзды (туннельный полёт)
  ctx.fillStyle = '#fff';
  stars.forEach(s => {
    s.y += speed * s.z * 0.8; // ближние быстрее
    if (s.y > canvas.height) s.y = -10;
    ctx.globalAlpha = s.z * 0.5 + 0.5;
    ctx.fillRect(s.x, s.y, s.size * s.z, s.size * s.z);
  });
  ctx.globalAlpha = 1;

  // Препятствия, бонусы, персонаж (как раньше, но с улучшенным прыжком)
  obstacles = obstacles.filter(o => o.y < canvas.height + 200);
  obstacles.forEach(o => { o.update(); o.draw(); });

  bonuses = bonuses.filter(b => b.y < canvas.height + 100);
  bonuses.forEach(b => { b.update(); b.draw(); });
  collectBonuses();

  if (isJumping) {
    playerY += gravity;
    if (playerY >= 0) { playerY = 0; isJumping = false; }
  }
  if (shieldTime > 0) shieldTime -= 1/60;

  const px = getLaneX(playerLane);
  const py = groundY() + playerY;

  // Персонаж
  ctx.shadowBlur = shieldTime > 0 ? 40 : 20;
  ctx.shadowColor = shieldTime > 0 ? '#00ffff' : '#00ff88';
  ctx.fillStyle = '#00ccff';
  ctx.fillRect(px - 55, py - 25, 110, 18);
  ctx.fillStyle = '#ff8800';
  ctx.beginPath(); ctx.arc(px - 40, py, 34, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px + 40, py, 34, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  if (checkCollision()) {
    gameOver = true; gameRunning = false;
    showMenu(false);
  }

  score += 0.4;
  document.getElementById('score').innerText = Math.floor(score);
  speed = 5 + score * 0.012;

  requestAnimationFrame(loop);
}

showMenu(true);
</script>
</body>
</html>
