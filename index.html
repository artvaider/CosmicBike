<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cosmic Bike Runner 3D</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.min.js"></script>
  <style>
    body { margin:0; overflow:hidden; background:#000; touch-action:none; }
    #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10; color:#fff; font-family:sans-serif; }
    #ui > * { pointer-events:auto; }
    #score { position:absolute; top:20px; left:20px; font-size:32px; text-shadow:0 0 10px #000; }
    #menu { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; background:rgba(0,0,0,0.8); padding:50px; border-radius:24px; display:flex; flex-direction:column; gap:24px; min-width:320px; box-shadow:0 0 40px #00ff88; }
    button { padding:18px 60px; font-size:28px; background:#00ff88; color:#000; border:none; border-radius:16px; font-weight:bold; cursor:pointer; }
    button.secondary { background:#555; color:#fff; }
    h1 { margin:0; font-size:56px; color:#00ff88; text-shadow:0 0 20px #00ff88; }
  </style>
</head>
<body>

<div id="ui">
  <div id="score">Счёт: 0</div>
  <div id="menu"></div>
</div>

<script>
// Telegram init
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Three.js setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000022);
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Космический туннель (простой cylinder + stars)
const tunnelGeo = new THREE.CylinderGeometry(10, 10, 1000, 32, 1, true);
const tunnelMat = new THREE.MeshBasicMaterial({
  color: 0x001133,
  side: THREE.BackSide,
  transparent: true,
  opacity: 0.6
});
const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
tunnel.rotation.x = Math.PI / 2;
scene.add(tunnel);

// Звёзды (particle system)
const starGeo = new THREE.BufferGeometry();
const starCount = 5000;
const positions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  positions[i*3] = (Math.random() - 0.5) * 200;
  positions[i*3+1] = (Math.random() - 0.5) * 200;
  positions[i*3+2] = (Math.random() - 0.5) * 1000 - 500;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.5 });
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Велосипед (простой group)
const bike = new THREE.Group();
const wheelGeo = new THREE.CircleGeometry(0.8, 32);
const wheelMat = new THREE.MeshBasicMaterial({ color: 0xff8800 });
const frontWheel = new THREE.Mesh(wheelGeo, wheelMat);
frontWheel.position.set(1.2, -1, 0);
bike.add(frontWheel);
const backWheel = new THREE.Mesh(wheelGeo, wheelMat);
backWheel.position.set(-1.2, -1, 0);
bike.add(backWheel);
const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: 0x00ccff }));
body.position.y = -0.5;
bike.add(body);
bike.position.y = -3;
scene.add(bike);

// Переменные игры
let playerLane = 0; // -1 left, 0 center, 1 right
let score = 0;
let speed = 0.5;
let gameRunning = false;
let obstacles = [];

// Управление (свайп)
let touchStartX = 0, touchStartY = 0;
renderer.domElement.addEventListener('pointerdown', e => {
  touchStartX = e.clientX;
  touchStartY = e.clientY;
});
renderer.domElement.addEventListener('pointerup', e => {
  if (!gameRunning) return;
  const dx = e.clientX - touchStartX;
  const dy = touchStartY - e.clientY;
  if (dy > 100) { // свайп вверх — прыжок
    bike.position.y = -1; // временный прыжок (потом анимация)
    setTimeout(() => bike.position.y = -3, 800);
  } else if (Math.abs(dx) > 50) {
    if (dx < 0 && playerLane > -1) playerLane--;
    if (dx > 0 && playerLane < 1) playerLane++;
  }
});

// Меню
function showMenu(isStart = true) {
  const menu = document.getElementById('menu');
  menu.innerHTML = isStart ?
    `<h1>Cosmic Bike 3D</h1><button id="play">Играть</button>` :
    `<h1 style="color:#ff4444;">Game Over</h1><p>Счёт: ${Math.floor(score)}</p>
     <button id="restart">Заново</button>
     <button id="main" class="secondary">В меню</button>`;
  menu.style.display = 'flex';
  if (!isStart) {
    document.getElementById('restart').onclick = startGame;
    document.getElementById('main').onclick = () => showMenu(true);
  } else {
    document.getElementById('play').onclick = startGame;
  }
}

function startGame() {
  document.getElementById('menu').style.display = 'none';
  gameRunning = true;
  score = 0;
  speed = 0.5;
  playerLane = 0;
  bike.position.x = 0;
  // очистка препятствий
  obstacles.forEach(o => scene.remove(o));
  obstacles = [];
  loop();
}

showMenu(true);

// Анимация
function loop() {
  requestAnimationFrame(loop);

  if (gameRunning) {
    // Движение вперёд
    tunnel.position.z += speed;
    if (tunnel.position.z > 500) tunnel.position.z = 0;

    stars.position.z += speed * 2;
    if (stars.position.z > 1000) stars.position.z = -1000;

    // Смена полосы
    bike.position.x = playerLane * 4;

    score += 0.1;
    document.getElementById('score').innerText = `Счёт: ${Math.floor(score)}`;

    speed += 0.0001; // плавное ускорение
  }

  renderer.render(scene, camera);
}
loop();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
